<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas — Summer's Paradise</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Yeseva+One&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../img/Favicon.png" type="image/x-icon">
  <style>
    :root {
      --teal-dk: #0b4b5c;
      --teal:    #1f7a8c;
      --teal-lt: #2a9db5;
      --sand:    #cfb49a;
      --sand-lt: #e8d5bc;
      --bg:      #f5f9fe;
      --bg-blue: #e8f6fb;
      --bg-blue2:#d0eaf6;
      --text:    #1e2f3a;
      --mist:    #6b8a99;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { overflow-x:hidden; scroll-behavior:smooth; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    .pt-page { max-width:1300px; margin:0 auto; padding:0 24px; width:100%; padding-top:130px; }

    /* (El resto del CSS es exactamente el mismo que tenías antes) */
    /* ... [CSS completo sin cambios] ... */


     /* ══ HERO ══ */
    .res-hero {
      position:relative;
      border-radius:28px;
      overflow:hidden;
      min-height:420px;
      margin-bottom:56px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:40px;
      padding:60px 56px;
    }

    /* Video de fondo */
    .res-hero-video-bg {
      position:absolute; inset:0; z-index:0;
      width:100%; height:100%;
      object-fit:cover;
    }

    /* Overlay oscuro sobre el video */
    .res-hero-overlay {
      position:absolute; inset:0; z-index:1;
      background: linear-gradient(135deg,
        rgba(11,75,92,0.82) 0%,
        rgba(11,45,58,0.75) 40%,
        rgba(8,28,36,0.65) 100%);
    }

    /* Patrón decorativo sutil encima */
    .res-hero-overlay::after {
      content:'';
      position:absolute; inset:0;
      background-image: radial-gradient(circle at 80% 20%, rgba(207,180,154,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 10% 80%, rgba(31,122,140,0.1) 0%, transparent 40%);
      pointer-events:none;
    }

    .res-hero-left { position:relative; z-index:2; }
    .res-hero-eyebrow { display:inline-flex; align-items:center; gap:10px; font-size:.75rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--sand-lt); margin-bottom:14px; }
    .res-hero-eyebrow::before { content:''; width:26px; height:2px; background:var(--sand); display:block; }
    .res-hero-title { font-family:'Yeseva One',serif; font-size:clamp(2.2rem,3.8vw,3.4rem); color:white; line-height:1.1; margin-bottom:14px; }
    .res-hero-title span { background:linear-gradient(90deg,#cfb49a,#f0d5bc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .res-hero-desc { color:rgba(255,255,255,.75); font-size:.95rem; line-height:1.75; max-width:480px; }
    .res-hero-stats { display:flex; gap:16px; position:relative; z-index:2; flex-shrink:0; }
    .res-stat { background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2); backdrop-filter:blur(8px); border-radius:20px; padding:22px 20px; text-align:center; min-width:110px; }
    .res-stat-icon { font-size:1.3rem; color:var(--sand); margin-bottom:8px; }
    .res-stat-num { font-family:'Yeseva One',serif; font-size:1.5rem; color:white; line-height:1; margin-bottom:4px; }
    .res-stat-label { font-size:.68rem; color:rgba(255,255,255,.6); font-weight:500; letter-spacing:.5px; }

    /* ══ STEPPER ══ */
    .res-stepper {
      display:flex; align-items:center; justify-content:center;
      gap:0; margin-bottom:52px; flex-wrap:wrap;
    }
    .res-step-btn {
      display:flex; align-items:center; gap:12px;
      padding:14px 24px; border-radius:40px; cursor:pointer;
      border:2px solid #cce0e8; background:white;
      transition:all .3s ease; font-family:'Inter',sans-serif;
    }
    .res-step-btn:hover { border-color:var(--teal); }
    .res-step-btn.active { background:linear-gradient(135deg,var(--teal-dk),var(--teal)); border-color:transparent; box-shadow:0 8px 28px rgba(11,75,92,.3); }
    .res-step-btn.done { border-color:var(--sand); background:rgba(207,180,154,.1); }
    .res-step-circle {
      width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
      justify-content:center; font-family:'Playfair Display',serif; font-weight:700;
      font-size:.95rem; background:#e8f0f4; color:var(--mist); flex-shrink:0; transition:all .3s;
    }
    .res-step-btn.active .res-step-circle { background:rgba(255,255,255,.25); color:white; }
    .res-step-btn.done .res-step-circle { background:var(--sand); color:white; }
    .res-step-info { display:flex; flex-direction:column; }
    .res-step-info strong { font-size:.85rem; font-weight:700; color:var(--teal-dk); line-height:1.1; }
    .res-step-info span { font-size:.68rem; color:var(--mist); }
    .res-step-btn.active .res-step-info strong,
    .res-step-btn.active .res-step-info span { color:white; }
    .res-step-btn.done .res-step-info strong { color:var(--teal-dk); }
    .res-step-line { width:40px; height:2px; background:#cce0e8; flex-shrink:0; margin:0 4px; transition:background .4s; }
    .res-step-line.done { background:linear-gradient(90deg,var(--sand),var(--teal)); }

    /* ══ LAYOUT PRINCIPAL ══ */
    .res-main-layout { display:grid; grid-template-columns:1fr 360px; gap:32px; align-items:start; }
    .res-content-area { min-width:0; }
    .res-panel { display:none; animation:panelIn .4s cubic-bezier(.16,1,.3,1) both; }
    .res-panel.active { display:block; }
    @keyframes panelIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    .res-panel-title { font-family:'Playfair Display',serif; font-size:1.75rem; color:var(--teal-dk); margin-bottom:6px; display:flex; align-items:center; gap:12px; }
    .res-panel-title i { color:var(--teal); font-size:1.3rem; }
    .res-panel-sub { color:var(--mist); font-size:.9rem; margin-bottom:28px; }

    /* ── Card blanca base ── */
    .res-card { background:white; border-radius:22px; box-shadow:0 6px 28px rgba(11,75,92,.07); border:1px solid rgba(11,75,92,.06); overflow:hidden; }

    /* ── PASO 1: Datos ── */
    .res-datos-grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
    .res-datos-inner { padding:32px 28px; }
    .res-field { display:flex; flex-direction:column; gap:6px; }
    .res-field.full { grid-column:1/-1; }
    .res-field label { font-size:.68rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--teal-dk); }
    .res-field input, .res-field select {
      padding:14px 18px; border:1.5px solid #d0eaf2; border-radius:14px;
      font-family:'Inter',sans-serif; font-size:.95rem; color:var(--text);
      background:#f7fbfd; outline:none; transition:all .2s; width:100%;
    }
    .res-field input:focus, .res-field select:focus { border-color:var(--teal); background:white; box-shadow:0 0 0 3px rgba(31,122,140,.1); }
    .res-passenger-ctrl {
      display:flex; align-items:center; gap:0;
      border:1.5px solid #d0eaf2; border-radius:14px;
      background:#f7fbfd; overflow:hidden;
    }
    .res-passenger-ctrl button {
      width:50px; height:52px; border:none; background:none; cursor:pointer;
      font-size:1.4rem; color:var(--teal-dk); font-weight:700; transition:background .2s;
      flex-shrink:0; font-family:'Inter',sans-serif;
    }
    .res-passenger-ctrl button:hover { background:var(--bg-blue); }
    .res-passenger-ctrl span { flex:1; text-align:center; font-size:1.5rem; font-weight:700; color:var(--teal-dk); font-family:'Yeseva One',serif; }

    /* ── PASO 2: Hoteles ── */
    .res-hotel-filter { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .res-destino-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(207,180,154,.15); border:1px solid rgba(207,180,154,.4); color:var(--teal-dk); font-size:.78rem; font-weight:700; padding:6px 16px; border-radius:20px; }
    .res-destino-badge i { color:var(--sand); }
    .res-hoteles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
    .res-hotel-card {
      background:white; border-radius:20px; overflow:hidden;
      border:2px solid #e8f0f4; transition:all .3s ease;
      box-shadow:0 4px 18px rgba(11,75,92,.06); cursor:pointer;
      display:flex; flex-direction:column;
    }
    .res-hotel-card:hover { transform:translateY(-5px); box-shadow:0 16px 44px rgba(11,75,92,.14); border-color:var(--teal); }
    .res-hotel-card.selected { border-color:var(--teal); box-shadow:0 0 0 3px rgba(31,122,140,.15), 0 12px 36px rgba(11,75,92,.14); }
    .res-hotel-img { width:100%; height:180px; object-fit:cover; display:block; transition:transform .5s; }
    .res-hotel-card:hover .res-hotel-img { transform:scale(1.05); }
    .res-hotel-img-wrap { overflow:hidden; position:relative; }
    .res-hotel-estrellas { position:absolute; top:12px; left:12px; background:rgba(0,0,0,.45); backdrop-filter:blur(4px); color:#f5b042; font-size:.78rem; padding:4px 10px; border-radius:20px; font-weight:700; }
    .res-hotel-body { padding:18px 18px 16px; flex:1; display:flex; flex-direction:column; }
    .res-hotel-name { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--teal-dk); margin-bottom:4px; }
    .res-hotel-destino { font-size:.75rem; color:var(--teal); font-weight:600; margin-bottom:8px; display:flex; align-items:center; gap:5px; }
    .res-hotel-desc { font-size:.8rem; color:var(--mist); line-height:1.55; margin-bottom:12px; flex:1; }
    .res-hotel-planes { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:14px; }
    .res-hotel-plan { font-size:.65rem; font-weight:600; background:var(--bg-blue); color:var(--teal-dk); padding:3px 10px; border-radius:12px; border:1px solid #c4dde6; }
    .res-hotel-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid #eef3f6; gap:8px; }
    .res-hotel-price { font-family:'Yeseva One',serif; font-size:1.15rem; color:var(--teal-dk); }
    .res-hotel-price small { font-family:'Inter',sans-serif; font-size:.68rem; color:var(--mist); font-weight:400; }
    .res-hotel-btns { display:flex; gap:6px; flex-shrink:0; }
    .res-btn-sm {
      padding:8px 14px; border-radius:30px; font-size:.72rem; font-weight:700;
      cursor:pointer; border:none; transition:all .25s; font-family:'Inter',sans-serif;
      display:inline-flex; align-items:center; gap:5px; white-space:nowrap;
    }
    .res-btn-elegir { background:linear-gradient(135deg,var(--teal-dk),var(--teal)); color:white; box-shadow:0 4px 14px rgba(11,75,92,.25); }
    .res-btn-elegir:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(11,75,92,.35); }
    .res-btn-elegir.selected { background:linear-gradient(135deg,var(--sand),#b89060); color:#0b1f28; }
    .res-btn-ver { background:white; color:var(--teal); border:1.5px solid #c4dde6; }
    .res-btn-ver:hover { border-color:var(--teal); background:var(--bg-blue); }

    /* ── PASO 3: Transporte ── */
    .res-transport-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
    .res-tcat-btn {
      padding:8px 18px; border-radius:30px; border:1.5px solid #c4dde6;
      background:white; color:var(--mist); font-size:.76rem; font-weight:700;
      cursor:pointer; transition:all .25s; font-family:'Inter',sans-serif;
    }
    .res-tcat-btn:hover { border-color:var(--teal); color:var(--teal); }
    .res-tcat-btn.active { background:linear-gradient(135deg,var(--teal-dk),var(--teal)); color:white; border-color:transparent; box-shadow:0 6px 18px rgba(11,75,92,.25); }
    .res-transport-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; }
    .res-trans-card {
      background:white; border-radius:18px; overflow:hidden;
      border:2px solid #e8f0f4; transition:all .3s; cursor:pointer;
      box-shadow:0 4px 16px rgba(11,75,92,.05);
    }
    .res-trans-card:hover { transform:translateY(-4px); box-shadow:0 14px 38px rgba(11,75,92,.13); border-color:var(--teal); }
    .res-trans-card.selected { border-color:var(--teal); box-shadow:0 0 0 3px rgba(31,122,140,.15); }
    .res-trans-img { width:100%; height:140px; object-fit:cover; display:block; }
    .res-trans-body { padding:14px 16px; }
    .res-trans-tipo { font-size:.62rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--sand); margin-bottom:4px; }
    .res-trans-name { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--teal-dk); margin-bottom:4px; }
    .res-trans-desc { font-size:.75rem; color:var(--mist); line-height:1.5; margin-bottom:10px; }
    .res-trans-footer { display:flex; align-items:center; justify-content:space-between; }
    .res-trans-cap { font-size:.7rem; color:var(--teal); background:var(--bg-blue); padding:3px 10px; border-radius:12px; font-weight:600; }
    .res-trans-price { font-size:.85rem; font-weight:700; color:var(--teal-dk); font-family:'Playfair Display',serif; }
    .res-trans-sel-btn {
      width:100%; margin-top:10px; padding:9px; border-radius:30px;
      border:none; font-family:'Inter',sans-serif; font-size:.76rem; font-weight:700;
      cursor:pointer; transition:all .25s; display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .res-trans-sel-btn.idle { background:#f0fbff; color:var(--teal-dk); border:1.5px solid #c4dde6; }
    .res-trans-sel-btn.idle:hover { background:var(--bg-blue); border-color:var(--teal); }
    .res-trans-sel-btn.chosen { background:linear-gradient(135deg,var(--teal-dk),var(--teal)); color:white; }

    /* ── PASO 4: Extras ── */
    .res-extras-list { display:flex; flex-direction:column; gap:14px; }
    .res-extra-row {
      display:flex; align-items:center; gap:16px; padding:20px 22px;
      background:white; border-radius:18px; border:2px solid #e8f0f4;
      box-shadow:0 3px 14px rgba(11,75,92,.05); transition:border-color .25s;
    }
    .res-extra-row:hover { border-color:var(--teal); }
    .res-extra-icon { font-size:2.2rem; flex-shrink:0; }
    .res-extra-info { flex:1; }
    .res-extra-name { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; color:var(--teal-dk); margin-bottom:3px; }
    .res-extra-desc { font-size:.8rem; color:var(--mist); line-height:1.5; }
    .res-extra-price { font-size:.85rem; font-weight:700; color:var(--teal); margin-right:8px; white-space:nowrap; }
    .res-toggle { position:relative; display:inline-block; width:50px; height:28px; flex-shrink:0; }
    .res-toggle input { opacity:0; width:0; height:0; }
    .res-slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccd8de; border-radius:28px; transition:.3s; }
    .res-slider:before { position:absolute; content:''; height:22px; width:22px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; box-shadow:0 2px 6px rgba(0,0,0,.15); }
    input:checked + .res-slider { background:linear-gradient(135deg,var(--teal-dk),var(--teal)); }
    input:checked + .res-slider:before { transform:translateX(22px); }

    /* ══ SIDEBAR RESUMEN ══ */
    .res-sidebar { position:sticky; top:130px; }
    .res-sidebar-card {
      background:linear-gradient(145deg,#0b4b5c,#1a6b7c);
      border-radius:24px; padding:28px 24px;
      box-shadow:0 16px 50px rgba(11,75,92,.35); color:white;
    }
    .res-sb-title { font-family:'Playfair Display',serif; font-size:1.25rem; color:white; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
    .res-sb-title i { color:var(--sand); }
    .res-sb-sub { font-size:.72rem; color:rgba(255,255,255,.5); margin-bottom:22px; letter-spacing:.5px; text-transform:uppercase; }
    .res-sb-row { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,.08); }
    .res-sb-row:last-of-type { border-bottom:none; }
    .res-sb-row-label { font-size:.78rem; color:rgba(255,255,255,.55); line-height:1.4; }
    .res-sb-row-value { font-size:.85rem; font-weight:600; color:rgba(255,255,255,.9); text-align:right; flex-shrink:0; max-width:55%; }
    .res-sb-divider { height:1px; background:rgba(255,255,255,.12); margin:16px 0; }
    .res-sb-total { display:flex; justify-content:space-between; align-items:baseline; }
    .res-sb-total-label { font-size:.8rem; color:rgba(255,255,255,.6); text-transform:uppercase; letter-spacing:1px; }
    .res-sb-total-value { font-family:'Yeseva One',serif; font-size:2rem; color:var(--sand); }
    .res-sb-note { font-size:.68rem; color:rgba(255,255,255,.35); margin-top:8px; text-align:right; }

    /* Botón carrito flotante */
    .res-cart-fab {
      position:fixed; bottom:32px; right:32px; z-index:800;
      width:62px; height:62px; border-radius:50%;
      background:linear-gradient(135deg,var(--sand),#b89060);
      border:none; color:#0b1f28; font-size:1.25rem;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; box-shadow:0 10px 34px rgba(207,180,154,.55);
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .res-cart-fab:hover { transform:scale(1.1); }
    .res-cart-badge {
      position:absolute; top:-4px; right:-4px;
      width:22px; height:22px; border-radius:50%;
      background:var(--teal-dk); color:white;
      font-size:.68rem; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      border:2px solid white;
    }

    /* ══ BOTONES DE NAVEGACIÓN ══ */
    .res-nav { display:flex; align-items:center; justify-content:space-between; margin-top:32px; gap:12px; }
    .res-nav.right { justify-content:flex-end; }
    .res-btn-back {
      display:inline-flex; align-items:center; gap:8px;
      padding:13px 26px; border-radius:40px; border:2px solid #c4dde6;
      background:white; color:var(--teal-dk); font-weight:700; font-size:.85rem;
      cursor:pointer; transition:all .25s; font-family:'Inter',sans-serif;
    }
    .res-btn-back:hover { border-color:var(--teal); background:var(--bg-blue); }
    .res-btn-next {
      display:inline-flex; align-items:center; gap:8px;
      padding:13px 32px; border-radius:40px; border:none;
      background:linear-gradient(135deg,var(--teal-dk),var(--teal));
      color:white; font-weight:700; font-size:.88rem;
      cursor:pointer; transition:all .3s; box-shadow:0 8px 24px rgba(11,75,92,.3);
      font-family:'Inter',sans-serif;
    }
    .res-btn-next:hover { transform:translateY(-2px); box-shadow:0 12px 32px rgba(11,75,92,.4); }
    .res-btn-confirm {
      display:inline-flex; align-items:center; gap:10px;
      padding:15px 40px; border-radius:40px; border:none;
      background:linear-gradient(135deg,var(--sand),#b89060);
      color:#0b1f28; font-weight:800; font-size:.95rem;
      cursor:pointer; transition:all .3s; box-shadow:0 10px 30px rgba(207,180,154,.45);
      font-family:'Inter',sans-serif;
    }
    .res-btn-confirm:hover { transform:translateY(-2px); box-shadow:0 14px 38px rgba(207,180,154,.6); }

    /* ══ MODAL HOTEL DETALLE ══ */
    .res-modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.8);
      z-index:9000; display:flex; align-items:center; justify-content:center;
      opacity:0; visibility:hidden; transition:all .3s; padding:20px;
    }
    .res-modal-overlay.open { opacity:1; visibility:visible; }
    .res-modal-box {
      background:white; max-width:1050px; width:100%; max-height:92vh;
      overflow-y:auto; border-radius:24px;
      box-shadow:0 30px 80px rgba(0,0,0,.4);
      transform:scale(.95) translateY(20px);
      transition:transform .4s cubic-bezier(.34,1.56,.64,1);
    }
    .res-modal-overlay.open .res-modal-box { transform:scale(1) translateY(0); }
    .res-modal-head {
      position:sticky; top:0; background:white; border-bottom:1px solid #eef3f6;
      padding:20px 28px; display:flex; align-items:center; justify-content:space-between; z-index:1;
    }
    .res-modal-head h2 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--teal-dk); }
    .res-modal-close { width:38px; height:38px; border-radius:50%; border:none; background:#f0f3f5; color:var(--mist); font-size:1.1rem; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; }
    .res-modal-close:hover { background:var(--teal-dk); color:white; }
    .res-modal-body { padding:28px 28px 32px; }
    .res-modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:36px; }
    .res-modal-gallery { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
    .res-modal-gallery img { width:100%; height:160px; object-fit:cover; border-radius:14px; }
    .res-modal-gallery img:first-child { grid-column:1/-1; height:220px; }
    .res-modal-amenities { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
    .res-modal-amenity { display:flex; align-items:center; gap:8px; font-size:.82rem; color:var(--text); }
    .res-modal-amenity i { color:var(--teal); font-size:.75rem; }

    /* ══ MODAL CONFIRMACIÓN ══ */
    .res-success-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(6px);
      z-index:9999; display:flex; align-items:center; justify-content:center;
      opacity:0; visibility:hidden; transition:all .3s;
    }
    .res-success-overlay.open { opacity:1; visibility:visible; }
    .res-success-box {
      background:white; border-radius:28px; padding:52px 44px; max-width:460px;
      width:90%; text-align:center; box-shadow:0 30px 80px rgba(0,0,0,.35);
      transform:scale(.9); transition:transform .45s cubic-bezier(.34,1.56,.64,1);
    }
    .res-success-overlay.open .res-success-box { transform:scale(1); }
    .res-success-ring { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg,var(--teal-dk),var(--teal)); display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:1.8rem; color:white; box-shadow:0 12px 34px rgba(11,75,92,.4); animation:ring-in .6s cubic-bezier(.34,1.56,.64,1) both; }

    .res-success-code { display:inline-block; background:#f0fbff; border:1.5px solid #c4dde6; border-radius:10px; padding:8px 22px; font-family:'Playfair Display',serif; font-size:1.4rem; font-weight:700; color:var(--teal-dk); letter-spacing:2px; margin:10px 0 18px; }
    .res-success-title { font-family:'Playfair Display',serif; font-size:1.7rem; color:var(--teal-dk); margin-bottom:8px; }
    .res-success-sub { font-size:.88rem; color:var(--mist); line-height:1.7; margin-bottom:28px; }
    .res-success-close { display:inline-flex; align-items:center; gap:8px; padding:13px 32px; border-radius:40px; border:none; background:linear-gradient(135deg,var(--teal-dk),var(--teal)); color:white; font-weight:700; font-size:.9rem; cursor:pointer; transition:all .25s; font-family:'Inter',sans-serif; }
    .res-success-close:hover { transform:translateY(-2px); }

    /* ══ RESPONSIVE ══ */
    @media(max-width:1100px) { .res-main-layout { grid-template-columns:1fr; } .res-sidebar { position:static; } }
    @media(max-width:900px) { .res-hero { flex-direction:column; padding:44px 28px; text-align:center; } .res-hero-stats { justify-content:center; } .res-modal-grid { grid-template-columns:1fr; } }
