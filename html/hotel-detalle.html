  <div class="pt-page hotel-detail-page">

      <div class="loading-spinner">Cargando información del hotel...</div>
    </div>
  </div>

  <!-- MODAL DE RESERVA -->
  <div id="reservaModal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modalHotelName">Reservar</h3>
        <button class="close-modal" id="closeModalBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label><i class="far fa-calendar-alt"></i> Fechas de estadía</label>
          <div class="date-range">
            <div class="form-group" style="margin-bottom: 0;">
              <input type="text" id="checkinDate" placeholder="Check-in" readonly>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
              <input type="text" id="checkoutDate" placeholder="Check-out" readonly>
            </div>
          </div>
        </div>
        
        <div class="price-preview" id="pricePreview">
          <p><strong>Precio por noche:</strong> <span id="nightRate">$0</span></p>
          <p><strong>Total estadía:</strong> <span id="totalPrice">$0</span></p>
        </div>

        <div class="form-group">
          <label><i class="fas fa-credit-card"></i> Datos de la tarjeta</label>
          <input type="text" id="cardNumber" placeholder="Número de tarjeta" maxlength="19">
        </div>
        <div class="card-row">
          <div class="form-group">
            <input type="text" id="cardExpiry" placeholder="MM/AA">
          </div>
          <div class="form-group">
            <input type="text" id="cardCvv" placeholder="CVV" maxlength="4">
          </div>
        </div>
        <div class="form-group">
          <input type="text" id="cardName" placeholder="Titular de la tarjeta">
        </div>
        
        <button class="btn-pagar" id="confirmPaymentBtn">Confirmar reserva y pagar</button>
        <div class="note-payment"><i class="fas fa-lock"></i> Pago 100% seguro. Simulación de reserva.</div>
      </div>
    </div>
  </div>

      'hilton-la-romana': {
        name: 'Hilton La Romana',
        tag: 'Todo Incluido · Familiar',
        rating: 9.2,
        price: 239,
        description: 'Hilton La Romana ofrece water park, spa y salidas a Isla Saona.',
        longDescription: 'Frente a la playa de Bayahibe, este resort todo incluido de la cadena Hilton es ideal para familias. Su parque acuático es uno de los más grandes de la zona, y ofrece excursiones a Isla Saona e Isla Catalina. Cuenta con 9 bares, múltiples restaurantes y un spa de primer nivel.',
        amenities: ['Water park', 'Spa & Wellness', '9 bares', 'Restaurantes temáticos', 'Salidas a Saona', 'Kids Club', 'Gimnasio'],
        images: [

        ],
        location: '<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d121132.30472124212!2d-68.9806564478266!3d18.420842325468918!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eaf542d55843735%3A0xe5e486063825f558!2sHilton%20Garden%20Inn%20La%20Romana!5e0!3m2!1ses-419!2sdo!4v1775573772039!5m2!1ses-419!2sdo" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>',
        season: 'diciembre – abril',
        stars: 5,
        category: 'Familiar'
      }
    };

    // Variables globales para el modal
    let currentHotel = null;
    let flatpickrCheckin, flatpickrCheckout;

    function getHotelId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // === FUNCIONES DEL MODAL ===
    function openReservationModal() {
      if (!currentHotel) return;
      
      const modal = document.getElementById('reservaModal');
      document.getElementById('modalHotelName').innerText = `Reservar en ${currentHotel.name}`;
      document.getElementById('nightRate').innerText = `$${currentHotel.price} USD`;
      document.getElementById('totalPrice').innerText = `$0 USD`;
      
      // Resetear campos
      document.getElementById('checkinDate').value = '';
      document.getElementById('checkoutDate').value = '';
      document.getElementById('cardNumber').value = '';
      document.getElementById('cardExpiry').value = '';
      document.getElementById('cardCvv').value = '';
      document.getElementById('cardName').value = '';
      
      modal.classList.add('active');
      
      // Inicializar flatpickr (calendario)
      if (flatpickrCheckin) flatpickrCheckin.destroy();
      if (flatpickrCheckout) flatpickrCheckout.destroy();
      
      flatpickrCheckin = flatpickr("#checkinDate", {
        locale: "es",
        dateFormat: "Y-m-d",
        minDate: "today",
        onChange: function(selectedDates, dateStr) {
          if (dateStr) {
            flatpickrCheckout.set('minDate', dateStr);
          }
          calculateTotal();
        }
      });
      
      flatpickrCheckout = flatpickr("#checkoutDate", {
        locale: "es",
        dateFormat: "Y-m-d",
        minDate: "today",
        onChange: function() { calculateTotal(); }
      });
    }

    function calculateTotal() {
      if (!currentHotel) return;
      const start = document.getElementById('checkinDate').value;
      const end = document.getElementById('checkoutDate').value;
      if (start && end) {
        const checkin = new Date(start);
        const checkout = new Date(end);
        const diffTime = Math.abs(checkout - checkin);
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (diffDays > 0) {
          const total = diffDays * currentHotel.price;
          document.getElementById('totalPrice').innerHTML = `$${total} USD`;
          return total;
        }
      }
      document.getElementById('totalPrice').innerHTML = `$0 USD`;
      return 0;
    }

    function closeModal() {
      const modal = document.getElementById('reservaModal');
      modal.classList.remove('active');
      if (flatpickrCheckin) flatpickrCheckin.destroy();
      if (flatpickrCheckout) flatpickrCheckout.destroy();
    }

    function loadHotelDetail() {
      const id = getHotelId();
      if (!id || !hotelsDB[id]) {
        document.getElementById('hotelDetailContainer').innerHTML = '<div class="error-message">Hotel no encontrado. <a href="hoteles.html">Volver a hoteles</a></div>';
        return;
      }
      currentHotel = hotelsDB[id];
      const container = document.getElementById('hotelDetailContainer');
      
      // Generar estrellas
      const starsHtml = Array(5).fill().map((_, i) => `<i class="fas fa-star${i < currentHotel.stars ? '' : '-alt'}"></i>`).join('');
      // Amenidades
      const amenitiesHtml = currentHotel.amenities.map(am => `<li><i class="fas fa-check-circle"></i> ${am}</li>`).join('');
      // Galería
      const galleryHtml = currentHotel.images.map(img => `<div class="gallery-item-hd"><img src="${img}" alt="${currentHotel.name}"></div>`).join('');
      // Descripción larga o corta
      const descHtml = currentHotel.longDescription || currentHotel.description;

      container.innerHTML = `
        <div class="hotel-detail-hero" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${currentHotel.images[0]}')">
          <div class="hero-content">
            <h1>${currentHotel.name}</h1>
            <div class="hero-rating">${starsHtml} <span>${currentHotel.rating} / 10</span></div>
            <p>${currentHotel.tag}</p>
          </div>
        </div>
        <div class="hotel-detail-grid">
          <div class="detail-main">
            <h2>Descripción</h2>
            <p class="hotel-desc">${descHtml}</p>
            <h2>Servicios y Amenidades</h2>
            <ul class="amenities-list">${amenitiesHtml}</ul>
            <h2>Galería</h2>
            <div class="gallery-grid-hd">${galleryHtml}</div>
          </div>
          <div class="detail-sidebar">
            <div class="price-box">
              <span class="price-amount">USD $${currentHotel.price}</span>
              <span class="price-night">/ noche</span>
              <div class="price-note">Impuestos incluidos</div>
              <button class="hotel-btn book-btn" id="openModalBtn">Reservar ahora</button>
            </div>
            <div class="info-box">
              <h3><i class="fas fa-map-marker-alt"></i> Ubicación</h3>
              <p>${currentHotel.location}</p>
            </div>
            <div class="info-box">
              <h3><i class="fas fa-calendar-alt"></i> Mejor época</h3>
              <p>${currentHotel.season}</p>
            </div>
            <div class="info-box">
              <h3><i class="fas fa-tag"></i> Categoría</h3>
              <p>${currentHotel.category}</p>
            </div>
          </div>
        </div>
      `;

      // Asignar evento al botón de reservar
      const openModalBtn = document.getElementById('openModalBtn');
      if (openModalBtn) {
        openModalBtn.addEventListener('click', openReservationModal);
      }
    }

    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', () => {
      loadHotelDetail();
      
      // Eventos del modal
      const closeBtn = document.getElementById('closeModalBtn');
      const modal = document.getElementById('reservaModal');
      
      if (closeBtn) {
        closeBtn.addEventListener('click', closeModal);
      }
      
      if (modal) {
        modal.addEventListener('click', (e) => {
          if (e.target === modal) closeModal();
        });
      }
      
      // Confirmar pago
      const confirmBtn = document.getElementById('confirmPaymentBtn');
      if (confirmBtn) {
        confirmBtn.addEventListener('click', () => {
          const checkin = document.getElementById('checkinDate').value;
          const checkout = document.getElementById('checkoutDate').value;
          const cardNum = document.getElementById('cardNumber').value.trim();
          const expiry = document.getElementById('cardExpiry').value;
          const cvv = document.getElementById('cardCvv').value;
          const cardHolder = document.getElementById('cardName').value.trim();
          
          if (!checkin || !checkout) {
            alert("❌ Por favor selecciona las fechas de check-in y check-out.");
            return;
          }
          if (!cardNum || !expiry || !cvv || !cardHolder) {
            alert("❌ Completa todos los datos de la tarjeta para continuar.");
            return;
          }
          const totalText = document.getElementById('totalPrice').innerText;
          if (totalText === "$0 USD") {
            alert("⚠️ Verifica las fechas, la estadía debe ser al menos 1 noche.");
            return;
          }
          
          alert(`✅ ¡Reserva confirmada en ${currentHotel.name}!\n📅 Desde ${checkin} hasta ${checkout}\n💰 Total: ${totalText}\n💳 Pago autorizado con tarjeta terminada en ${cardNum.slice(-4)}.\n¡Gracias por confiar en Summer's Paradise!`);
          closeModal();
        });
      }
      
      // Formatear número de tarjeta
      const cardNumberInput = document.getElementById('cardNumber');
      if (cardNumberInput) {
        cardNumberInput.addEventListener('input', (e) => {
          let val = e.target.value.replace(/\D/g, '');
          if (val.length > 16) val = val.slice(0, 16);
          let formatted = '';
          for (let i = 0; i < val.length; i++) {
            if (i > 0 && i % 4 === 0) formatted += ' ';
            formatted += val[i];
          }
          e.target.value = formatted;
        });
      }
    });
  </script>
